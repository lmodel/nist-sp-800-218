---
id: https://w3id.org/lmodel/nist-sp-800-218
name: nist-sp-800-218
title: nist-sp-800-218
description: >-
  'Electronic (LinkML) Version of Secure Software Development Framework (SSDF): Recommendations for Mitigating the Risk of Software Vulnerabilities'
version: 1.1.0
source: https://doi.org/10.6028/NIST.SP.800-218
license: Apache-2.0
see_also:
  - https://lmodel.github.io/nist-sp-800-218

default_prefix: nist_sp_800_218
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  nist_sp_800_218: https://w3id.org/lmodel/nist-sp-800-218/

imports:
  - linkml:types

subsets:
  nist_sp_800_218_catalog:
    description: >-
      NIST SP 800-218 SSDF Catalog subset for practice groups, practices, and tasks

slots:
  catalog:
    description: Root catalog payload
    range: CatalogBody
    inlined: true
    in_subset:
      - nist_sp_800_218_catalog

  metadata:
    description: Catalog metadata
    range: Metadata
    inlined: true
    in_subset:
      - nist_sp_800_218_catalog

  groups:
    description: List of SSDF practice groups in the catalog
    range: ControlGroup
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  controls:
    description: List of practices or tasks
    range: Control
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  props:
    description: List of properties
    range: Property
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  links:
    description: List of links and relationships
    range: Link
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  parts:
    description: Nested parts that provide prose and structure
    range: Part
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  id:
    description: Unique identifier for an element
    in_subset:
      - nist_sp_800_218_catalog

  uuid:
    description: UUID for catalog or resource element
    in_subset:
      - nist_sp_800_218_catalog

  title:
    description: Human-readable title
    in_subset:
      - nist_sp_800_218_catalog

  version:
    description: Version identifier
    in_subset:
      - nist_sp_800_218_catalog

  published:
    description: Publication timestamp
    in_subset:
      - nist_sp_800_218_catalog

  "last-modified":
    description: Last modification timestamp
    aliases:
      - last_modified
    in_subset:
      - nist_sp_800_218_catalog

  "oscal-version":
    description: OSCAL version identifier
    aliases:
      - oscal_version
    in_subset:
      - nist_sp_800_218_catalog

  _class:
    alias: class
    description: Classification of a catalog element
    in_subset:
      - nist_sp_800_218_catalog

  name:
    description: Name of a property or part
    in_subset:
      - nist_sp_800_218_catalog

  value:
    description: Property value
    in_subset:
      - nist_sp_800_218_catalog

  ns:
    description: Namespace URI for a property
    in_subset:
      - nist_sp_800_218_catalog

  prose:
    description: Free-text prose content
    in_subset:
      - nist_sp_800_218_catalog

  roles:
    description: Roles used in metadata
    range: Role
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  parties:
    description: Parties used in metadata
    range: Party
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  "responsible-parties":
    description: Responsible party assignments
    aliases:
      - responsible_parties
    range: ResponsibleParty
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  "role-id":
    description: Assigned role identifier
    aliases:
      - role_id
    in_subset:
      - nist_sp_800_218_catalog

  "party-uuids":
    description: Referenced party UUIDs
    aliases:
      - party_uuids
    multivalued: true
    in_subset:
      - nist_sp_800_218_catalog

  type:
    description: Party type
    in_subset:
      - nist_sp_800_218_catalog

  "short-name":
    description: Short display name
    aliases:
      - short_name
    in_subset:
      - nist_sp_800_218_catalog

  "email-addresses":
    description: Party email addresses
    aliases:
      - email_addresses
    multivalued: true
    in_subset:
      - nist_sp_800_218_catalog

  addresses:
    description: Postal addresses
    range: Address
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  "addr-lines":
    description: Address lines
    aliases:
      - addr_lines
    multivalued: true
    in_subset:
      - nist_sp_800_218_catalog

  city:
    description: City name
    in_subset:
      - nist_sp_800_218_catalog

  state:
    description: State or region
    in_subset:
      - nist_sp_800_218_catalog

  "postal-code":
    description: Postal code
    aliases:
      - postal_code
    in_subset:
      - nist_sp_800_218_catalog

  "back-matter":
    description: Back-matter references and resources
    aliases:
      - back_matter
    range: BackMatter
    inlined: true
    in_subset:
      - nist_sp_800_218_catalog

  resources:
    description: Back-matter resources
    range: Resource
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  citation:
    description: Citation details for a resource
    range: Citation
    inlined: true
    in_subset:
      - nist_sp_800_218_catalog

  text:
    description: Citation or link annotation text
    in_subset:
      - nist_sp_800_218_catalog

  rlinks:
    description: Resource links
    range: ResourceLink
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_218_catalog

  href:
    description: Link or resource reference URI
    in_subset:
      - nist_sp_800_218_catalog

  rel:
    description: Relationship type for a link
    in_subset:
      - nist_sp_800_218_catalog

enums:
  CatalogElementClassValue:
    description: Allowed class values for SSDF catalog elements
    permissible_values:
      group:
        description: A top-level practice group
      practice:
        description: An SSDF practice within a group
      task:
        description: A task within an SSDF practice
    in_subset:
      - nist_sp_800_218_catalog

classes:
  SSFDDocument:
    description: Root wrapper for SSDF catalog content
    tree_root: true
    class_uri: linkml:Any
    slots:
      - catalog
    in_subset:
      - nist_sp_800_218_catalog

  CatalogBody:
    description: Main SSDF catalog object
    class_uri: linkml:Any
    slots:
      - uuid
      - metadata
      - groups
      - "back-matter"
    in_subset:
      - nist_sp_800_218_catalog

  Metadata:
    description: OSCAL metadata section for the SSDF catalog
    class_uri: linkml:Any
    slots:
      - title
      - published
      - "last-modified"
      - version
      - "oscal-version"
      - props
      - links
      - roles
      - parties
      - "responsible-parties"
    in_subset:
      - nist_sp_800_218_catalog

  Role:
    description: Role definition
    slots:
      - id
      - title
    in_subset:
      - nist_sp_800_218_catalog

  Party:
    description: Party definition
    class_uri: linkml:Any
    slots:
      - uuid
      - type
      - name
      - "short-name"
      - "email-addresses"
      - addresses
    in_subset:
      - nist_sp_800_218_catalog

  Address:
    description: Postal address
    class_uri: linkml:Any
    slots:
      - "addr-lines"
      - city
      - state
      - "postal-code"
    in_subset:
      - nist_sp_800_218_catalog

  ResponsibleParty:
    description: Assignment of parties to a role
    class_uri: linkml:Any
    slots:
      - "role-id"
      - "party-uuids"
    in_subset:
      - nist_sp_800_218_catalog

  BackMatter:
    description: OSCAL back-matter section
    class_uri: linkml:Any
    slots:
      - resources
    in_subset:
      - nist_sp_800_218_catalog

  Resource:
    description: Referenced resource in back-matter
    class_uri: linkml:Any
    slots:
      - uuid
      - title
      - citation
      - rlinks
    in_subset:
      - nist_sp_800_218_catalog

  Citation:
    description: Citation wrapper
    class_uri: linkml:Any
    slots:
      - text
    in_subset:
      - nist_sp_800_218_catalog

  ResourceLink:
    description: Reference link for a resource
    class_uri: linkml:Any
    slots:
      - href
    in_subset:
      - nist_sp_800_218_catalog

  CatalogElement:
    description: Base class for identifiable catalog elements
    abstract: true
    slots:
      - id
      - props
      - links
      - parts
    in_subset:
      - nist_sp_800_218_catalog

  IdentifiedElement:
    description: A catalog element with a title and class classification
    is_a: CatalogElement
    slots:
      - title
      - _class
    slot_usage:
      _class:
        range: CatalogElementClassValue
    in_subset:
      - nist_sp_800_218_catalog

  ControlGroup:
    description: An SSDF practice group (e.g. PO, PS, PW, RV)
    is_a: IdentifiedElement
    slots:
      - controls
    in_subset:
      - nist_sp_800_218_catalog

  Control:
    description: An SSDF practice containing tasks
    is_a: IdentifiedElement
    slots:
      - controls
    slot_usage:
      controls:
        range: Task
    in_subset:
      - nist_sp_800_218_catalog

  Task:
    description: An SSDF task within a practice
    is_a: IdentifiedElement
    in_subset:
      - nist_sp_800_218_catalog

  Property:
    description: A name-value property with optional namespace
    slots:
      - name
      - value
      - ns
    in_subset:
      - nist_sp_800_218_catalog

  Link:
    description: Relationship link with optional annotation text
    slots:
      - href
      - rel
      - text
    in_subset:
      - nist_sp_800_218_catalog

  Part:
    description: Structured narrative part containing prose content
    is_a: IdentifiedElement
    slots:
      - name
      - prose
    in_subset:
      - nist_sp_800_218_catalog

