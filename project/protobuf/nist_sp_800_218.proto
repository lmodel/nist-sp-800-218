 syntax="proto3";
 package
// metamodel_version: 1.7.0
// version: 1.1.0
// Postal address
message Address
 {
 repeated  string addr-lines = 0
  string city = 0
  string state = 0
  string postal-code = 0
 }
// OSCAL back-matter section
message BackMatter
 {
 repeated  resource resources = 0
 }
// Main SSDF catalog object
message CatalogBody
 {
  string uuid = 0
  metadata metadata = 0
 repeated  controlGroup groups = 0
  backMatter back-matter = 0
 }
// Citation wrapper
message Citation
 {
  string text = 0
 }
// An SSDF practice containing tasks
message Control
 {
  string id = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  part parts = 0
  string title = 0
  catalogElementClassValue class = 0
 repeated  task controls = 0
 }
// An SSDF practice group (e.g. PO, PS, PW, RV)
message ControlGroup
 {
  string id = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  part parts = 0
  string title = 0
  catalogElementClassValue class = 0
 repeated  control controls = 0
 }
// A catalog element with a title and class classification
message IdentifiedElement
 {
  string id = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  part parts = 0
  string title = 0
  catalogElementClassValue class = 0
 }
// Relationship link with optional annotation text
message Link
 {
  string href = 0
  string rel = 0
  string text = 0
 }
// OSCAL metadata section for the SSDF catalog
message Metadata
 {
  string title = 0
  string published = 0
  string last-modified = 0
  string version = 0
  string oscal-version = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  role roles = 0
 repeated  party parties = 0
 repeated  responsibleParty responsible-parties = 0
 }
// Structured narrative part containing prose content
message Part
 {
  string id = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  part parts = 0
  string title = 0
  catalogElementClassValue class = 0
  string name = 0
  string prose = 0
 }
// Party definition
message Party
 {
  string uuid = 0
  string type = 0
  string name = 0
  string short-name = 0
 repeated  string email-addresses = 0
 repeated  address addresses = 0
 }
// A name-value property with optional namespace
message Property
 {
  string name = 0
  string value = 0
  string ns = 0
 }
// Referenced resource in back-matter
message Resource
 {
  string uuid = 0
  string title = 0
  citation citation = 0
 repeated  resourceLink rlinks = 0
 }
// Reference link for a resource
message ResourceLink
 {
  string href = 0
 }
// Assignment of parties to a role
message ResponsibleParty
 {
  string role-id = 0
 repeated  string party-uuids = 0
 }
// Role definition
message Role
 {
  string id = 0
  string title = 0
 }
// Root wrapper for SSDF catalog content
message SSFDDocument
 {
  catalogBody catalog = 0
 }
// An SSDF task within a practice
message Task
 {
  string id = 0
 repeated  property props = 0
 repeated  link links = 0
 repeated  part parts = 0
  string title = 0
  catalogElementClassValue class = 0
 }
